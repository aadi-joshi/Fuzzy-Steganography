# ===========================================================
# V2 Configuration — Adaptive Fuzzy Steganographic Framework
# ===========================================================
# Full research pipeline settings.
# ===========================================================

random_seed: 42

# ---- Dataset ----
dataset:
  n_images: 1000
  image_size: [256, 256]
  output_dir: "data/covers_v2"
  bossbase_dir: null     # Set to local BOSSbase path if available

# ---- Cryptography ----
crypto:
  kdf_algorithm: "argon2id"
  argon2_time_cost: 3
  argon2_memory_cost: 65536
  argon2_parallelism: 4
  argon2_hash_len: 32
  argon2_salt_len: 16

# ---- Steganography ----
stego:
  payload_bpp_levels: [0.05, 0.1, 0.2, 0.3, 0.4]
  max_lsb_depth: 3
  header_bits: 64
  fuzzy:
    entropy_window_size: 7
    entropy_universe: [0.0, 8.0]
    edge_universe: [0.0, 1.0]
    pressure_universe: [0.0, 1.0]
    depth_universe: [1.0, 3.0]

    entropy_mf:
      low:    [0.0, 0.0, 1.5, 3.0]
      medium: [2.0, 3.5, 5.0, 6.5]
      high:   [5.5, 6.5, 8.0, 8.0]

    edge_mf:
      weak:   [0.0, 0.0, 0.15, 0.35]
      moderate: [0.2, 0.4, 0.6, 0.8]
      strong: [0.65, 0.8, 1.0, 1.0]

    pressure_mf:
      low:    [0.0, 0.0, 0.2, 0.4]
      medium: [0.25, 0.45, 0.55, 0.75]
      high:   [0.6, 0.8, 1.0, 1.0]

    depth_mf:
      shallow:  [1.0, 1.0, 1.3, 1.7]
      moderate: [1.4, 1.8, 2.2, 2.6]
      deep:     [2.3, 2.7, 3.0, 3.0]

    defuzzification: "centroid"

# ---- Evaluation subsets ----
evaluation:
  n_images_sync: 200         # Images for sync analysis
  n_images_ablation: 100     # Images for ablation study
  n_images_complexity: 50    # Images for timing analysis
  deep_steganalysis_folds: 5 # K-fold CV for steganalysis

# ---- Experiment I/O ----
experiment:
  output_dir: "data/outputs_v2"
  plot_format: "pdf"
  plot_dpi: 300
  log_level: "INFO"
